##### 🎨 Aparência e Tema #####

# Habilita 24-bit truecolor (importante para Kitty/Wayland)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:Tc'

# Cores principais
set -g status-bg "#1e1e2e"       # base
set -g status-fg "#bac2de"       # subtext1
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#89b4fa"
set -g message-style fg="#1e1e2e",bg="#89b4fa",bold
set -g mode-style bg="#313244",fg="#cdd6f4"

# Barra de status
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-left "#[fg=#89b4fa,bold] #H "
set -g status-right "#[fg=#b4befe]%Y-%m-%d #[fg=#89dceb]%H:%M #[fg=#fab387]#(whoami)"

# Tema Catppuccin e indicação das janelas
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "text"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Dividir painéis
bind h split-window -h
bind v split-window -v
bind x kill-pane

# Navegação intuitiva com Alt + setas
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Alternar entre janelas
bind Tab last-window

# Sincronizar painéis
bind S setw synchronize-panes \; display-message "Painéis sincronizados!"

# Recarregar configuração
bind r source-file ~/.tmux.conf \; display-message "🎨 Configuração recarregada!"

##### 🪟 Sessões e janelas #####

# Renomeia janelas automaticamente com o comando em execução
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Histórico e tempo de escape
set -g history-limit 10000
set -s escape-time 0

# Habilita suporte ao mouse (scroll e clique)
set -g mouse on
