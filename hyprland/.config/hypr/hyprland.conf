# Setup monitors
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1,preferred,0x0,1.5
#monitor = HDMI-A-1,preferred,0x-1080,1
#monitor = DP-1,preferred,0x-1080,1


# Environment Variables
env = _JAVA_AWT_WM_NONREPARENTING,1
env = XCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1
env = HYPRLAND_NO_SD_NOTIFY,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XCOMPOSEFILE,/home/feokuma/.config/xkb/compose
env = XCOMPOSECACHE,/home/feokuma/.cache/xcompose

# Configuração do dotnet
env = DOTNET_ROOT,/home/feokuma/.dotnet
env = PATH,$PATH:/home/feokuma/.dotnet:/home/feokuma/.dotnet/tools

env = GTK_THEME,Adwaita:dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = fcitx5
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = hypridle
exec-once = mako
#exec-once = nm-applet
exec-once = wlr-randr

# Enable clipboard support
exec-once = wl-paste
exec-once = wl-copy

exec-once = lxqt-policykit-agent

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = intl
    # kb_options = caps:escape_shifted_capslock

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = true
    }

   sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 5
    border_size = 0
    col.active_border=rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
    disable_splash_rendering = yes
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    
    blur { 
        enabled = false
        size = 7
        passes = 3
    }

    shadow {
        enabled = true
        range = 2
        render_power = 1
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier, gnomed
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slide
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gesture = 3, horizontal, workspace
}

xwayland {
    force_zero_scaling = true   # evita blur em HiDPI / fractional scaling
}

# Window rules
windowrule {
    name = thunar
    match:class = thunar
    opacity = 0.95
    size = 1200 800
    center = true
    float = true
}

windowrule {
    name = gtk-file-portal
    match:class = ^xdg-desktop-portal-gtk$
    float = true
    size = 1200 800
    center = true
}

windowrule {
    name = chrome-file-dialogs
    match:class = ^(google-chrome|Google-chrome|chromium|Chromium)$
    match:title = ^(Save File|Save As|Salvar arquivo|Open File|Abrir arquivo)$
    float = true
    size = 1200 800
    center = true
}

windowrule {
    name = firefox
    match:class = firefox
}

windowrule {
    name = code
    match:class = code
    opacity = 0.98
}

windowrule {
    name = kitty
    match:class = kitty
    opacity = 0.95
}

windowrule {
    name = jetbrains
    match:class = jetbrains-*
    center = true
}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty  #open the terminal
bind = MOD_ALT, F4, killactive, # close the active window
bind = $mainMod, L, exec, hyprlock # Lock the screen
bind = $mainMod, M, exec, wlogout --protocol layer-shell # show the logout window
bind = $mainMod SHIFT, M, exit, # Exit Hyprland all together no (force quit Hyprland)
bind = $mainMod, E, exec, thunar # Show the graphical file browser
bind = ALT, SPACE, exec, wofi --show drun# Show the graphicall app launcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit, # dwindle
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f - # take a screenshot
bind = ALT, N, exec, networkmanager_dmenu -b --dmenu 'wofi --show dmenu'
bind = CTRL, PERIOD, exec, wofi-emoji --clipboard
bind = $mainMod, F, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow
bind = $mainMod, SPACE, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next
bind = SUPER SHIFT, R, exec, sh -c 'pkill -x waybar; sleep 0.2; nohup /usr/bin/waybar >/tmp/waybar.log 2>&1 &'
bind = $mainMod, C, exec, hyprpicker -a

# ROG G15 Strix (2021) Specific binds
bind = ,156, exec, rog-control-center # ASUS Armory crate key
bind = ,211, exec, asusctl profile -n; pkill -SIGRTMIN+8 waybar # Fan Profile key switch between power profiles
#bind = ,123, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
#bind = ,122, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
#bind = ,121, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = ,232, exec, brightnessctl set 1%- # Screen brightness down FN+F7
bind = ,233, exec, brightnessctl set 1%+ # Screen brightness up FN+F8
bind = ,237, exec, brightnessctl -d asus::kbd_backlight set 33%- # Keyboard brightness down FN+F2
bind = ,238, exec, brightnessctl -d asus::kbd_backlight set 33%+ # Keyboard brightnes up FN+F3
bind = ,210, exec, asusctl led-mode -n # Switch keyboard RGB profile FN+F4

# Controle de volume
bind = ,123, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ && pkill -SIGRTMIN+8 waybar
bind = ,122, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- && pkill -SIGRTMIN+8 waybar
bind = ,121, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && pkill -SIGRTMIN+8 waybar


# Move focus with mainMod + arrow keys
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Config Swappy plus hyprshot
bind = , Print, exec, hyprshot -m region -o - | swappy -f -

# Trigger when the switch is turning on.
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
# Trigger when the switch is turning off.
bindl = , switch:off:Lid Switch, exec, hyprctl reload
